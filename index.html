  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#050505;color:#e8e8e8;line-height:1.6}
    a{color:inherit;text-decoration:none}
    img{max-width:100%;height:auto;display:block;border-radius:.5rem}
    .container{max-width:1200px;margin:0 auto;padding:0 1.5rem}
    .btn-primary{background:linear-gradient(135deg,#ff1a1a,#b30000);color:#fff;padding:.75rem 1.5rem;border-radius:9999px;font-weight:600;display:inline-block;transition:opacity .2s}
    .btn-primary:hover{opacity:.9}
    .btn-secondary{background:rgba(255,255,255,.08);color:#fff;padding:.75rem 1.5rem;border-radius:9999px;font-weight:600;display:inline-block;border:1px solid rgba(255,255,255,.12);transition:background .2s}
    .btn-secondary:hover{background:rgba(255,255,255,.15)}

    /* 01 Age Banner */
    .age-banner{background:#1a0505;color:#ff9999;text-align:center;padding:.5rem;font-size:.8rem;font-weight:600;border-bottom:1px solid rgba(255,26,26,.2)}

    /* 02 Header */
    header{position:sticky;top:0;z-index:50;background:rgba(5,5,5,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06)}
    .header-inner{display:flex;align-items:center;justify-content:space-between;padding:1rem 0}
    .logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#ff1a1a,#b30000);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    nav{display:flex;gap:2rem}
    nav a{color:#a1a1aa;font-size:.9rem;transition:color .2s}
    nav a:hover{color:#fff}

    /* 03 Hero */
    .hero{text-align:center;padding:5rem 0 3rem}
    .hero h1{font-size:3rem;font-weight:800;line-height:1.1;margin-bottom:1rem;background:linear-gradient(135deg,#fff 30%,#ff1a1a 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hero .subtitle{font-size:1.25rem;color:#a1a1aa;max-width:600px;margin:0 auto 2rem}
    .hero-buttons{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}

    /* 04 Social Proof */
    .social-proof{background:rgba(255,26,26,.05);border-top:1px solid rgba(255,26,26,.1);border-bottom:1px solid rgba(255,26,26,.1);padding:1.5rem 0}
    .stats{display:flex;justify-content:center;gap:3rem;flex-wrap:wrap;text-align:center}
    .stat-number{font-size:1.75rem;font-weight:800;color:#ff1a1a}
    .stat-label{font-size:.85rem;color:#a1a1aa}

    /* 05 Features */
    .features{padding:4rem 0}
    .section-title{text-align:center;font-size:2rem;font-weight:700;margin-bottom:.5rem}
    .section-subtitle{text-align:center;color:#a1a1aa;margin-bottom:3rem}
    .feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem}
    .feature-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:1rem;padding:2rem;transition:transform .2s,border-color .2s}
    .feature-card:hover{transform:translateY(-4px);border-color:rgba(255,26,26,.3)}
    .feature-icon{font-size:2rem;margin-bottom:1rem}
    .feature-card h3{font-size:1.25rem;font-weight:600;margin-bottom:.5rem}
    .feature-card p{color:#a1a1aa;font-size:.95rem}

    /* 06 How It Works */
    .how-it-works{padding:4rem 0;background:rgba(255,26,26,.03)}
    .steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2rem;margin-top:2rem}
    .step{text-align:center}
    .step-number{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#ff1a1a,#b30000);display:flex;align-items:center;justify-content:center;font-weight:700;margin:0 auto 1rem}
    .step h3{font-size:1.1rem;font-weight:600;margin-bottom:.5rem}
    .step p{color:#a1a1aa;font-size:.9rem}

    /* 07 Models */
    .models{padding:4rem 0}
    .models-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
    @media(max-width:767px){.models-grid{grid-template-columns:1fr}}
    .model-card{position:relative;border-radius:.75rem;overflow:hidden;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);transition:transform .2s}
    .model-card:hover{transform:scale(1.02);border-color:rgba(255,26,26,.3)}
    .model-card img{width:100%;aspect-ratio:3/4;object-fit:cover}
    .model-info{padding:1rem}
    .model-info h4{font-weight:600;margin-bottom:.25rem}
    .model-info p{font-size:.85rem;color:#a1a1aa}
    .model-tag{display:inline-block;background:rgba(255,26,26,.15);color:#ff1a1a;padding:.15rem .5rem;border-radius:9999px;font-size:.75rem;margin-top:.5rem}
    .model-live-btn{display:block;width:100%;margin-top:.75rem;padding:.5rem 0;text-align:center;background:linear-gradient(135deg,#ff1a1a,#b30000);color:#fff;border-radius:9999px;font-size:.85rem;font-weight:600;transition:opacity .2s}
    .model-live-btn:hover{opacity:.9}

    /* 08 Builder */
    .builder-section{padding:4rem 0;background:rgba(255,26,26,.03)}
    .builder-content{max-width:800px;margin:0 auto;text-align:center}
    .builder-text{color:#a1a1aa;font-size:1.05rem;line-height:1.8;margin-bottom:2rem}
    .builder-text p{margin-bottom:1.25rem}
    .builder-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin:2rem 0}
    .builder-step{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:1rem;padding:1.5rem;text-align:center}
    .builder-step-icon{font-size:2rem;margin-bottom:.75rem}
    .builder-step h4{font-size:1rem;font-weight:600;margin-bottom:.5rem}
    .builder-step p{color:#a1a1aa;font-size:.9rem}

    /* 09 Testimonials */
    .testimonials{padding:4rem 0;background:rgba(255,26,26,.03)}
    .testimonial-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
    .testimonial-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:1rem;padding:1.5rem}
    .testimonial-card .stars{color:#ff1a1a;margin-bottom:.5rem}
    .testimonial-card p{color:#d4d4d8;margin-bottom:1rem;font-style:italic}
    .testimonial-author{font-weight:600;font-size:.9rem}
    .testimonial-role{font-size:.8rem;color:#a1a1aa}

    /* 09 Pricing */
    .pricing{padding:4rem 0}
    .pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem;max-width:900px;margin:0 auto}
    .plan{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:1rem;padding:2rem;text-align:center;position:relative}
    .plan.popular{border-color:rgba(255,26,26,.4);background:rgba(255,26,26,.05)}
    .popular-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ff1a1a,#b30000);color:#fff;padding:.25rem 1rem;border-radius:9999px;font-size:.75rem;font-weight:600}
    .plan-name{font-size:1.25rem;font-weight:700;margin-bottom:.5rem}
    .plan-price{font-size:2.5rem;font-weight:800;margin-bottom:.5rem}
    .plan-price span{font-size:1rem;color:#a1a1aa;font-weight:400}
    .plan-features{list-style:none;margin:1.5rem 0}
    .plan-features li{padding:.4rem 0;color:#a1a1aa;font-size:.9rem}
    .plan-features li::before{content:"✓";color:#ff1a1a;margin-right:.5rem}

    /* 10 FAQ */
    .faq{padding:4rem 0;background:rgba(255,26,26,.03)}
    .faq details{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:.75rem;margin-bottom:1rem;padding:1rem 1.25rem;cursor:pointer}
    .faq summary{font-weight:600;list-style:none;display:flex;justify-content:space-between;align-items:center}
    .faq summary::after{content:"+";color:#ff1a1a;font-size:1.25rem}
    .faq details[open] summary::after{content:"−"}
    .faq details p{color:#a1a1aa;margin-top:.75rem;font-size:.95rem}

    /* 11 CTA */
    .cta-section{text-align:center;padding:5rem 0;background:linear-gradient(135deg,rgba(255,26,26,.1),rgba(179,0,0,.05))}
    .cta-section h2{font-size:2rem;font-weight:700;margin-bottom:1rem}
    .cta-section p{color:#a1a1aa;margin-bottom:2rem}

    /* 12 Footer */
    footer{padding:3rem 0 2rem;border-top:1px solid rgba(255,255,255,.06)}
    .footer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:2rem;margin-bottom:2rem}
    .footer-col h4{font-size:1rem;font-weight:600;margin-bottom:1rem}
    .footer-col a{display:block;color:#a1a1aa;font-size:.9rem;padding:.25rem 0;transition:color .2s}
    .footer-col a:hover{color:#fff}
    .footer-bottom{text-align:center;padding-top:2rem;border-top:1px solid rgba(255,255,255,.06)}
    .footer-bottom .age-warning{color:#ff1a1a;font-weight:600;margin-bottom:.5rem}
    .affiliate-disclosure{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:.5rem;padding:1rem;margin-bottom:1.5rem;font-size:.85rem;color:#a1a1aa}
    .affiliate-disclosure a{color:#ff1a1a;text-decoration:underline}

    @media(max-width:768px){
      .hero h1{font-size:2rem}
      nav{display:none}
      .stats{gap:1.5rem}
      .feature-grid,.testimonial-grid{grid-template-columns:1fr}
      .steps{grid-template-columns:1fr}
    }
  .lang-dropdown{position:relative;display:inline-block}
    .lang-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:.5rem;transition:all .2s;width:100%}
    .lang-btn:hover{background:rgba(255,255,255,.15)}
    .lang-menu{position:absolute;bottom:calc(100% + .5rem);left:0;background:#1a1a1a;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:.5rem;min-width:200px;box-shadow:0 -10px 40px rgba(0,0,0,.5);opacity:0;visibility:hidden;transform:translateY(10px);transition:all .2s;z-index:1000;max-height:320px;overflow-y:auto}
    .lang-menu.open{opacity:1;visibility:visible;transform:translateY(0)}
    .lang-item{display:block;padding:.5rem .75rem;border-radius:6px;color:#a1a1aa;font-size:.9rem;transition:all .15s;text-decoration:none}
    .lang-item:hover{background:rgba(255,26,26,.15);color:#fff}
    .lang-item.active{background:rgba(255,26,26,.25);color:#ff1a1a;font-weight:600}
    .lang-menu::-webkit-scrollbar{width:6px}
    .lang-menu::-webkit-scrollbar-track{background:transparent}
    .lang-menu::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
  </style>
</head>
